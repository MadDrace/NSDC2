<!doctype html>
<html lang="en" ng-app="shopApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="app.js"></script>
</head>
<body ng-controller="MainCtrl">
  <header>
    <div class="navbar">
      <h1>Store</h1>
      <nav>
        <a href="home.html">Home</a>
        <a href="store.html">Store</a>
        <a href="cart.html">Cart ({{cartCount()}})</a>
        <a href="order.html">Order</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </header>
  <div class="navbar">
    <br><br><br>
    <div class="product-list">
      <div class="product" ng-repeat="product in products">
        <h3>{{product.name}}</h3>
        <p>{{product.desc}}</p>
        <p><strong>${{product.price}}</strong></p>
        <button class="button" ng-click="addToCart(product)">Add to Cart</button>
      </div>
    </div>
  </div><br>
<footer class="footer">Buy Something</footer>
</body>
</html>
