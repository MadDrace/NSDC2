<!doctype html>
<html lang="en" ng-app="shopApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Simple Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="app.js"></script>
</head>
<body ng-controller="MainCtrl">
  <header>
    <div class="navbar">
      <h1>Cart</h1>
      <nav>
        <a href="home.html">Home</a>
        <a href="store.html">Store</a>
        <a href="cart.html">Cart ({{cartCount()}})</a>
        <a href="order.html">Order</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </header>
  <div class="navbar">
    <div class="card">
      <h2>Your Shopping Cart</h2>
      <p ng-if="!cart.length">Your cart is empty. Go to the store to add items.</p>
      <table class="table" ng-if="cart.length">
        <thead>
          <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="item in cart">
            <td>{{item.name}}</td>
            <td>{{item.qty}}</td>
            <td>${{item.price}}</td>
            <td>${{item.price * item.qty}}</td>
            <td><button class="button danger" ng-click="removeItem(item)">Remove</button></td>
          </tr>
        </tbody>
      </table>
      <div class="cardord" ng-if="cart.length">
        <p><strong>Order total:</strong> ${{total()}}</p>
        <button class="button secondary" ng-click="clearCart()">Clear Cart</button>
        <a class="button" href="order.html">Checkout</a>
      </div>
    </div>
  </div>
  <footer class="footer">Cart</footer>
</body>
</html>
