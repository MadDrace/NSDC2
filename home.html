<!doctype html>
<html lang="en" ng-app="shopApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Simple Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="app.js"></script>
</head>
<body ng-controller="MainCtrl">
  <header>
    <div class="navbar">
            <h1>VV Online Store</h1><br><br>
      <nav>
  
        <a href="home.html">Home</a>
        <a href="store.html">Store</a>
        <a href="cart.html">Cart ({{cartCount()}})</a>
        <a href="order.html">Order</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </header>
  <br><br>
  <div class="navbar">
    <div class="card">
      <h2>Welcome to your online store</h2>
      <p>Place an order.</p>
      <p>Login as a user to shop, or login as an official to add more products.</p>
      <p><strong>Cart items:</strong> {{cartCount()}}</p>
      <a class="button" href="login.html">Login</a>
      <a class="button" href="store.html">Browse Store</a>
    </div>
  </div>
  <br><br>
  <footer class="footer">Think Different, Buy Different....</footer>
</body>
</html>
