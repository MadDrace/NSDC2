<!doctype html>
<html lang="en" ng-app="shopApp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Simple Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body ng-controller="MainCtrl">
  <header>
    <div class="container">
      <h1>Login</h1>
      <nav>
        <a href="home.html">Home</a>
        <a href="store.html">Store</a>
        <a href="cart.html">Cart ({{cartCount()}})</a>
        <a href="order.html">Order</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </header>
  <div class="container">
    <div class="card">
      <h2>User or Official</h2>
      <p>Choose your role. Users can shop. Officials can add products.</p>
      <div class="message" ng-if="loginMessage">{{loginMessage}}</div>
      <form ng-submit="login()">
        <div class="form-field">
          <label>Select role</label>
          <select ng-model="loginAttempt.role">
            <option value="user">User</option>
            <option value="official">Official</option>
          </select>
        </div>
        <div class="form-field">
          <label>Name</label>
          <input type="text" ng-model="loginAttempt.name" placeholder="Your name">
        </div>
        <div class="form-field">
          <label>Email</label>
          <input type="email" ng-model="loginAttempt.email" placeholder="you@example.com">
        </div>
        <button class="button" type="submit">Login</button>
      </form>
    </div>
    <div class="card" ng-if="user.role !== 'guest'">
      <h3>Current session</h3>
      <p><strong>Name:</strong> {{user.name}}</p>
      <p><strong>Role:</strong> {{user.role}}</p>
      <button class="button secondary" ng-click="logout()">Logout</button>
      <div ng-if="user.role === 'official'">
        <a class="button" href="official.html">Manage Products</a>
      </div>
      <div ng-if="user.role === 'user'">
        <a class="button" href="store.html">Go to Store</a>
      </div>
    </div>
  </div>
  <footer class="footer">Login page for users and officials.</footer>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
